<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: var(--figma-color-bg, #ffffff);
        color: var(--figma-color-text, #111827);
      }

      main {
        display: grid;
        gap: 16px;
        padding: 18px;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--figma-color-text-secondary, #5f6368);
        font-size: 12px;
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 7px;
        font-size: 12px;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid var(--figma-color-border, #d1d5db);
        border-radius: 6px;
        padding: 8px 9px;
        background: var(--figma-color-bg, #ffffff);
        color: var(--figma-color-text, #111827);
        font: inherit;
        font-size: 12px;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--figma-color-border, #d1d5db);
        border-radius: 6px;
        padding: 0 12px;
        background: var(--figma-color-bg, #ffffff);
        color: var(--figma-color-text, #111827);
        font: inherit;
        font-size: 12px;
        font-weight: 700;
      }

      button.primary {
        border-color: #2563eb;
        background: #2563eb;
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .status {
        min-height: 54px;
        border: 1px solid var(--figma-color-border, #e5e7eb);
        border-radius: 8px;
        padding: 10px;
        background: var(--figma-color-bg-secondary, #f8fafc);
        color: var(--figma-color-text-secondary, #475569);
        font-size: 12px;
        line-height: 1.5;
      }

      .status[data-tone="error"] {
        border-color: #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }

      .status[data-tone="success"] {
        border-color: #bbf7d0;
        background: #f0fdf4;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Figma Image Markup</h1>
        <p>Export the current Figma selection and open it in the shared Image Markup editor.</p>
      </div>

      <label>
        Web app URL
        <input id="origin" value="https://www.addlet.pro" />
      </label>

      <div class="actions">
        <button class="primary" id="export">Export selection</button>
        <button id="open" disabled>Open editor</button>
      </div>

      <button id="insert" disabled>Insert revision</button>
      <button id="close">Close</button>
      <div class="status" id="status">Select one layer, frame, component, or image, then export it.</div>
    </main>

    <script>
      const exportButton = document.getElementById("export");
      const openButton = document.getElementById("open");
      const insertButton = document.getElementById("insert");
      const closeButton = document.getElementById("close");
      const originInput = document.getElementById("origin");
      const statusBox = document.getElementById("status");
      let editorUrl = "";
      let editingSession = null;

      exportButton.addEventListener("click", () => {
        editorUrl = "";
        editingSession = null;
        openButton.disabled = true;
        insertButton.disabled = true;
        setStatus("Exporting selected Figma content...");
        parent.postMessage({ pluginMessage: { type: "export-selection" } }, "*");
      });

      openButton.addEventListener("click", () => {
        if (!editorUrl) return;
        parent.postMessage({ pluginMessage: { type: "open-editor", url: editorUrl } }, "*");
      });

      insertButton.addEventListener("click", async () => {
        await insertLatestRevision();
      });

      closeButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      });

      window.onmessage = async (event) => {
        const message = event.data && event.data.pluginMessage;
        if (!message || !message.type) return;

        if (message.type === "export-error") {
          setStatus(message.error || "Could not export selection.", "error");
          return;
        }

        if (message.type === "insert-success") {
          setStatus(`Inserted ${message.nodeName || "revision"} into this Figma file.`, "success");
          return;
        }

        if (message.type === "insert-error") {
          setStatus(message.error || "Could not insert the revision.", "error");
          insertButton.disabled = false;
          return;
        }

        if (message.type === "selection-exported") {
          await uploadExportedSelection(message);
        }
      };

      async function uploadExportedSelection(message) {
        setStatus("Uploading PNG to Image Markup...");
        exportButton.disabled = true;

        try {
          const origin = normalizeOrigin(originInput.value);
          const bytes = normalizeBytes(message.bytes);
          const blob = new Blob([bytes], { type: "image/png" });
          const filename = sanitizeFilename(message.filename || "figma-selection.png");
          const formData = new FormData();
          formData.set("file", new File([blob], filename, { type: "image/png" }));
          formData.set("filename", filename);
          formData.set("prefix", "figma/image-markup/source");
          formData.set("contentType", "image/png");

          const response = await fetch(`${origin}/api/image-markup/r2/upload`, {
            method: "POST",
            body: formData,
          });
          const result = await response.json().catch(() => ({}));

          if (!response.ok || !result.ok || !result.key) {
            throw new Error(result.error || "Upload failed.");
          }

          const sessionResponse = await fetch(`${origin}/api/image-markup/figma/session`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              sourceR2Key: result.key,
              sourceLabel: message.sourceLabel || filename.replace(/\.png$/i, ""),
              width: message.width,
              height: message.height,
              size: bytes.byteLength,
            }),
          });
          const session = await sessionResponse.json().catch(() => ({}));
          if (!sessionResponse.ok || !session.ok || !session.sessionId || !session.sessionToken) {
            throw new Error(session.error || "Could not create an editing session.");
          }

          const url = new URL("/image-markup/editor", origin);
          url.searchParams.set("sessionId", session.sessionId);
          url.searchParams.set("sessionToken", session.sessionToken);
          url.searchParams.set("localUpload", "1");
          url.searchParams.set("apptype", "drive");
          url.searchParams.set("sourceR2Key", result.key);
          url.searchParams.set("sourceLabel", message.sourceLabel || filename.replace(/\.png$/i, ""));
          editorUrl = url.toString();
          editingSession = {
            origin,
            sessionId: session.sessionId,
            sessionToken: session.sessionToken,
            sourceLabel: message.sourceLabel || filename.replace(/\.png$/i, ""),
          };
          openButton.disabled = false;
          insertButton.disabled = false;
          setStatus("Image is ready. Open the editor, generate a revision, then insert it here.", "success");
        } catch (error) {
          setStatus(error && error.message ? error.message : "Could not prepare the image.", "error");
        } finally {
          exportButton.disabled = false;
        }
      }

      async function insertLatestRevision() {
        if (!editingSession) {
          setStatus("Export a selection and open the editor first.", "error");
          return;
        }

        setStatus("Looking for the latest generated revision...");
        insertButton.disabled = true;

        try {
          const params = new URLSearchParams({
            sessionId: editingSession.sessionId,
            sessionToken: editingSession.sessionToken,
          });
          const response = await fetch(`${editingSession.origin}/api/image-markup/figma/latest-revision?${params.toString()}`);
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok || !result.revisedImageUrl) {
            throw new Error(result.error || "Generate a revision in the editor first.");
          }

          setStatus("Downloading generated revision...");
          const imageUrl = new URL(result.revisedImageUrl, editingSession.origin);
          const imageResponse = await fetch(imageUrl.toString());
          if (!imageResponse.ok) {
            throw new Error("Could not download the generated revision.");
          }

          const bytes = new Uint8Array(await imageResponse.arrayBuffer());
          setStatus("Inserting generated revision into Figma...");
          parent.postMessage({
            pluginMessage: {
              type: "insert-image",
              bytes,
              label: `${editingSession.sourceLabel || "Figma selection"} revised`,
            },
          }, "*");
        } catch (error) {
          setStatus(error && error.message ? error.message : "Could not insert the generated revision.", "error");
          insertButton.disabled = false;
        }
      }

      function normalizeOrigin(value) {
        const url = new URL(String(value || "").trim());
        return url.origin;
      }

      function normalizeBytes(value) {
        if (value instanceof Uint8Array) return value;
        if (Array.isArray(value)) return new Uint8Array(value);
        if (value && typeof value.length === "number") return new Uint8Array(value);
        return new Uint8Array(Object.values(value || {}));
      }

      function sanitizeFilename(value) {
        const name = String(value)
          .trim()
          .replace(/[^a-z0-9._-]+/gi, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 90);
        return /\.png$/i.test(name) ? name : `${name || "figma-selection"}.png`;
      }

      function setStatus(message, tone) {
        statusBox.textContent = message;
        if (tone) {
          statusBox.dataset.tone = tone;
        } else {
          delete statusBox.dataset.tone;
        }
      }
    </script>
  </body>
</html>
